version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: erp_postgres
    restart: always
    ports:
      - "127.0.0.1:5432:5432"
    env_file:
      - ./backend/.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - erp_network

  redis:
    image: redis:7
    container_name: erp_redis
    restart: always
    ports:
      - "127.0.0.1:6379:6379"
    networks:
      - erp_network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: erp_zookeeper
    restart: always
    ports:
      - "127.0.0.1:2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    networks:
      - erp_network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: erp_kafka
    restart: always
    depends_on:
      - zookeeper
    ports:
      - "127.0.0.1:9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - erp_network

  minio:
    image: minio/minio
    container_name: erp_minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - erp_network

  pgadmin:
    image: dpage/pgadmin4
    container_name: erp_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@luma.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "127.0.0.1:5050:80"
    depends_on:
      - postgres
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - erp_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: erp_backend
    restart: always
    depends_on:
      - postgres
      - redis
      - kafka
      - minio
    env_file:
      - ./backend/.env
    networks:
      - erp_network
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health" ]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: erp_frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "80:80"
    networks:
      - erp_network

volumes:
  postgres_data:
  minio_data:
  pgadmin_data:


networks:
  erp_network:
    driver: bridge
    driver_opts:
      com.docker.network.driver.mtu: 1280
