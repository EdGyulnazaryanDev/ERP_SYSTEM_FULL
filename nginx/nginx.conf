upstream monolith {
    server backend:3000;
}

upstream inventory_service {
    server inventory-service:3001;
}

upstream procurement_service {
    server procurement-service:3002;
}

upstream accounting_service {
    server accounting-service:3003;
}

upstream hr_service {
    server hr-service:3004;
}

upstream crm_service {
    server crm-service:3005;
}

server {
    listen 80;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header Connection "";

    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    location /api/inventory/ {
        proxy_pass http://inventory_service;
    }

    location /api/procurement/ {
        proxy_pass http://procurement_service;
    }

    location /api/accounting/ {
        proxy_pass http://accounting_service;
    }

    location /api/hr/ {
        proxy_pass http://hr_service;
    }

    location /api/crm/ {
        proxy_pass http://crm_service;
    }

    location / {
        proxy_pass http://monolith;
    }
}
