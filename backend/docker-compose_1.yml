version: '3.8'

services:

  postgres:
    image: postgres:15
    container_name: erp_postgres
    restart: always
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - erp_network

  redis:
    image: redis:7
    container_name: erp_redis
    restart: always
    networks:
      - erp_network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: erp_zookeeper
    restart: always
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    networks:
      - erp_network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: erp_kafka
    restart: always
    depends_on:
      - zookeeper
    environment:
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - erp_network

  minio:
    image: minio/minio
    container_name: erp_minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - erp_network

  pgadmin:
    image: dpage/pgadmin4
    container_name: erp_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@luma.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - erp_network

  api:
    build: .
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    env_file:
      - .env
    volumes:
      - .:/app
      - /app/node_modules
    command: npm run start:dev
    networks:
      - erp_network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api"]
      interval: 10s
      timeout: 5s
      retries: 3

  nginx:
    image: nginx:alpine
    container_name: erp_nginx
    restart: always
    depends_on:
      - api
    ports:
      - "3000:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - erp_network

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: erp_frontend
    restart: always
    depends_on:
      - nginx
    ports:
      - "5173:80"
    networks:
      - erp_network

volumes:
  postgres_data:
  minio_data:
  pgadmin_data:

networks:
  erp_network:
    driver: bridge
